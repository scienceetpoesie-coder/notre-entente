<!DOCTYPE html>
<html>
<head>
<link rel="icon" href="https://github.com/scienceetpoesie/notre-entente/raw/refs/heads/main/assets/coeur" type="image/x-icon">
<meta charset="utf-8">
<title>MODULOVE</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#fff; font-family:'Times New Roman',serif;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  min-height:100vh; padding:40px 20px; gap:20px;
}
.scene { display:flex; align-items:center; justify-content:center; gap:20px; }
#imgBtn {
  width:60px; height:60px; flex-shrink:0; background:#cc0000;
  border-top:3px solid #ff6666; border-left:3px solid #ff4444;
  border-bottom:3px solid #660000; border-right:3px solid #880000; cursor:pointer;
}
#imgBtn:active {
  border-top:3px solid #660000; border-left:3px solid #880000;
  border-bottom:3px solid #ff6666; border-right:3px solid #ff4444; background:#aa0000;
}
#soundBtn {
  width:60px; height:60px; flex-shrink:0; background:#111;
  border-top:3px solid #444; border-left:3px solid #333;
  border-bottom:3px solid #000; border-right:3px solid #000;
  cursor:pointer; font-size:22px; color:#555;
  display:flex; align-items:center; justify-content:center;
  user-select:none; font-family:'Times New Roman',serif;
}
#soundBtn.on { color:#ddd; background:#1a1a2e; border-top-color:#5555bb; border-left-color:#4444aa; }
canvas { display:block; width:720px; height:480px; flex-shrink:0; }
.controls { width:90vw; max-width:800px; display:flex; flex-direction:column; gap:14px; }
.slider-row { display:flex; align-items:center; gap:16px; }
.slider-row label { font-size:13px; letter-spacing:.08em; text-transform:uppercase; color:#555; width:130px; flex-shrink:0; }
.slider-row input[type=range] { flex:1; accent-color:#888; }
.slider-row span { font-size:13px; color:#333; width:44px; text-align:right; }
.btn-row { display:flex; align-items:center; gap:16px; }
.btn-row label { font-size:13px; letter-spacing:.08em; text-transform:uppercase; color:#555; width:130px; flex-shrink:0; }
#dirBtn {
  width:48px; height:48px; font-size:13px; font-family:'Times New Roman',serif;
  background:#f0f0f0; color:black;
  border-top:2px solid #fff; border-left:2px solid #fff;
  border-bottom:2px solid #888; border-right:2px solid #888; cursor:pointer; font-weight:bold;
}
#dirBtn:active {
  border-top:2px solid #888; border-left:2px solid #888;
  border-bottom:2px solid #fff; border-right:2px solid #fff; background:#ddd;
}
.separator { border:none; border-top:1px solid #eee; margin:6px 0; }
.section-label { font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#aaa; }
#imgLabel { font-size:13px; color:#888; letter-spacing:.06em; font-family:Arial,sans-serif; width:720px; max-width:90vw; padding:6px 0 0 260px; }
#synthInfo { font-size:11px; color:#7777bb; letter-spacing:.08em; font-family:Arial,sans-serif; text-transform:uppercase; padding:2px 0 0 260px; width:720px; max-width:90vw; min-height:16px; }
</style>
</head>
<body>

<div class="scene">
  <button id="soundBtn">&#9834;</button>
  <canvas id="c" width="720" height="480"></canvas>
  <button id="imgBtn"></button>
</div>
<div id="imgLabel">—</div>
<div id="synthInfo"></div>

<div class="controls">
  <div class="section-label">Taille</div>
  <div class="slider-row"><label>Hauteur :</label><input type="range" id="scaleY" min="0.3" max="3" step="0.01" value="1.00"><span id="scaleYVal">1.00</span></div>
  <div class="slider-row"><label>Largeur :</label><input type="range" id="scaleX" min="0.3" max="3" step="0.01" value="1.45"><span id="scaleXVal">1.45</span></div>
  <hr class="separator">
  <div class="section-label">Ondulation</div>
  <div class="slider-row"><label>Répétition :</label><input type="range" id="rep" min="1" max="60" step="0.5" value="7"><span id="repVal">7.0</span></div>
  <div class="slider-row"><label>Vitesse :</label><input type="range" id="spd" min="0" max="30" step="0.1" value="3"><span id="spdVal">3.0</span></div>
  <div class="slider-row"><label>Amplitude :</label><input type="range" id="amp" min="0" max="1.2" step="0.01" value="0.04"><span id="ampVal">0.04</span></div>
  <div class="btn-row"><label>Axe :</label><button id="dirBtn">Y</button></div>
  <div class="section-label">Chaos</div>
  <div class="slider-row"><input type="range" id="randomSlider" min="0" max="1" step="0.01" value="0" style="accent-color:#111"><span id="randomVal">0.00</span></div>
</div>

<script>
var DEF = { scaleY:1.00, scaleX:1.45, rep:7, spd:3, amp:0.04, dir:1, chaos:0 };

var BASE = 'https://raw.githubusercontent.com/scienceetpoesie-coder/notre-entente/main/assets/';
var images = [
  { url:BASE+'Stephane-Ravier.png',                    name:'Stéphane Ravier',    synth:'ravier',    defaults:{scaleY:0.99,scaleX:0.67,rep:9.5,spd:6.6,amp:0.07,dir:1,chaos:0} },
  { url:BASE+'steiniger_johannes_gross.jpg',            name:'Johannes Steiniger', synth:'steiniger', defaults:{} },
  { url:BASE+'phillipe%20val.jpg',                      name:'Phillipe Val',       synth:'val',       defaults:{} },
  { url:BASE+'Christoph_Blocher_(Bundesrat,_2004).jpg', name:'Christoph Blocher',  synth:'blocher',   defaults:{scaleY:1.34,scaleX:1.11,rep:10,spd:0.6,amp:0.12,dir:0,chaos:0} },
  { url:BASE+'Gilles-Lellouche.png',                    name:'Gilles Lellouche',   synth:'lellouche', defaults:{} },
];

var imgIndex = 0;
do { imgIndex = Math.floor(Math.random() * images.length); } while (imgIndex === 4);

var gRep=DEF.rep, gSpd=DEF.spd, gAmp=DEF.amp, gDir=DEF.dir, gChaos=DEF.chaos;
var gScaleX=DEF.scaleX, gScaleY=DEF.scaleY;
var actx=null, synthOn=false, masterGain=null, patchNodes=[], updateFn=null;

/* ── WebGL ── */
var canvas = document.getElementById('c');
var gl = canvas.getContext('webgl');
gl.viewport(0,0,720,480);

var VERT = `
attribute vec2 a_pos;
varying vec2 v_uv;
uniform float u_scaleX, u_scaleY;
void main(){
  vec2 uv = (a_pos + 1.0) * 0.5;
  uv.y = 1.0 - uv.y;
  uv.x = (uv.x - 0.5) / u_scaleX + 0.5;
  uv.y = (uv.y - 0.5) / u_scaleY + 0.5;
  v_uv = uv;
  gl_Position = vec4(a_pos, 0.0, 1.0);
}`;

/* ── Fragment shader : chaos Perlin organique, zéro glitch/aberration ── */
var FRAG = `
precision mediump float;
varying vec2 v_uv;
uniform float u_time, u_rep, u_spd, u_amp, u_dir, u_chaos;
uniform sampler2D u_tex;

float hash(vec2 p){ return fract(sin(dot(p,vec2(127.1,311.7)))*43758.5453); }
float vnoise(vec2 p){
  vec2 i=floor(p), f=fract(p);
  f = f*f*(3.0-2.0*f);
  float a=hash(i), b=hash(i+vec2(1,0)), c=hash(i+vec2(0,1)), d=hash(i+vec2(1,1));
  return mix(mix(a,b,f.x), mix(c,d,f.x), f.y);
}

/* Déformation organique : 2 couches Perlin grandes mailles
   couche 1 : grandes ondulations lentes (renflements)
   couche 2 : frémissements plus rapides, amplitude moindre
   Pas de glitch, pas d'aberration chromatique.
   À mi-course le visage est déformé mais lisible.
   À fond : sculpture abstraite mais structurée. */
vec2 organicWarp(vec2 uv, float t, float amount){
  float s1 = 1.8;
  float nx1 = vnoise(uv * s1 + vec2(t * 0.10, 0.0)) - 0.5;
  float ny1 = vnoise(uv * s1 + vec2(0.0, t * 0.12) + vec2(3.7, 8.2)) - 0.5;
  float s2 = 5.0;
  float nx2 = vnoise(uv * s2 + vec2(-t * 0.24, t * 0.17) + vec2(1.3, 4.1)) - 0.5;
  float ny2 = vnoise(uv * s2 + vec2(t * 0.20, -t * 0.14) + vec2(6.6, 2.9)) - 0.5;
  vec2 d = vec2(nx1, ny1) * 0.72 + vec2(nx2, ny2) * 0.32;
  return uv + d * amount;
}

void main(){
  vec2 uv = v_uv;

  /* onde principale */
  if(u_dir < 0.5){
    uv.y += sin(uv.x * u_rep + u_time * u_spd) * u_amp;
  } else {
    uv.x += sin(uv.y * u_rep + u_time * u_spd) * u_amp;
  }

  /* chaos organique progressif — courbe quadratique pour douceur à mi-course */
  if(u_chaos > 0.0){
    float amount = u_chaos * u_chaos * 0.42;
    uv = organicWarp(uv, u_time, amount);
  }

  float mask = step(0.0,uv.x)*step(0.0,uv.y)*step(uv.x,1.0)*step(uv.y,1.0);
  vec4 col = texture2D(u_tex, clamp(uv, 0.0, 1.0));
  gl_FragColor = col * mask + vec4(1.0) * (1.0 - mask);
}`;

function mkSh(t,s){ var sh=gl.createShader(t); gl.shaderSource(sh,s); gl.compileShader(sh); return sh; }
var prog = gl.createProgram();
gl.attachShader(prog, mkSh(gl.VERTEX_SHADER, VERT));
gl.attachShader(prog, mkSh(gl.FRAGMENT_SHADER, FRAG));
gl.linkProgram(prog); gl.useProgram(prog);

var vbuf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, vbuf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1,1,-1,-1,1,1,1]), gl.STATIC_DRAW);
var aloc = gl.getAttribLocation(prog,'a_pos');
gl.enableVertexAttribArray(aloc);
gl.vertexAttribPointer(aloc,2,gl.FLOAT,false,0,0);

var U = {
  time:   gl.getUniformLocation(prog,'u_time'),
  rep:    gl.getUniformLocation(prog,'u_rep'),
  spd:    gl.getUniformLocation(prog,'u_spd'),
  amp:    gl.getUniformLocation(prog,'u_amp'),
  dir:    gl.getUniformLocation(prog,'u_dir'),
  chaos:  gl.getUniformLocation(prog,'u_chaos'),
  scaleX: gl.getUniformLocation(prog,'u_scaleX'),
  scaleY: gl.getUniformLocation(prog,'u_scaleY'),
};

var tex = gl.createTexture();
gl.bindTexture(gl.TEXTURE_2D, tex);
gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,1,1,0,gl.RGBA,gl.UNSIGNED_BYTE,new Uint8Array([180,180,180,255]));
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);

function loadImage(index, applyDef) {
  var e = images[index];
  document.getElementById('imgLabel').textContent = e.name;
  if(applyDef){
    var p = {};
    for(var k in DEF) p[k] = DEF[k];
    for(var k in e.defaults) p[k] = e.defaults[k];
    applyParams(p);
  }
  var img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = function(){
    gl.bindTexture(gl.TEXTURE_2D, tex);
    gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, gl.RGBA, gl.UNSIGNED_BYTE, img);
  };
  img.src = e.url;
  if(synthOn && actx) rebuildPatch(e.synth || 'ravier');
}

/* ── UI ── */
function applyParams(p){
  gScaleY=p.scaleY; gScaleX=p.scaleX; gRep=p.rep; gSpd=p.spd; gAmp=p.amp; gDir=p.dir; gChaos=p.chaos;
  document.getElementById('scaleY').value=gScaleY;        document.getElementById('scaleYVal').textContent=gScaleY.toFixed(2);
  document.getElementById('scaleX').value=gScaleX;        document.getElementById('scaleXVal').textContent=gScaleX.toFixed(2);
  document.getElementById('rep').value=gRep;              document.getElementById('repVal').textContent=(+gRep).toFixed(1);
  document.getElementById('spd').value=gSpd;              document.getElementById('spdVal').textContent=(+gSpd).toFixed(1);
  document.getElementById('amp').value=gAmp;              document.getElementById('ampVal').textContent=(+gAmp).toFixed(2);
  document.getElementById('dirBtn').textContent=gDir<0.5?'X':'Y';
  document.getElementById('randomSlider').value=gChaos;   document.getElementById('randomVal').textContent=(+gChaos).toFixed(2);
}

document.getElementById('rep').oninput          = function(e){ gRep    =+e.target.value; document.getElementById('repVal').textContent   =(+gRep).toFixed(1);    };
document.getElementById('spd').oninput          = function(e){ gSpd    =+e.target.value; document.getElementById('spdVal').textContent   =(+gSpd).toFixed(1);    };
document.getElementById('amp').oninput          = function(e){ gAmp    =+e.target.value; document.getElementById('ampVal').textContent   =(+gAmp).toFixed(2);    };
document.getElementById('scaleX').oninput       = function(e){ gScaleX =+e.target.value; document.getElementById('scaleXVal').textContent=(+gScaleX).toFixed(2); };
document.getElementById('scaleY').oninput       = function(e){ gScaleY =+e.target.value; document.getElementById('scaleYVal').textContent=(+gScaleY).toFixed(2); };
document.getElementById('randomSlider').oninput = function(e){ gChaos  =+e.target.value; document.getElementById('randomVal').textContent=(+gChaos).toFixed(2);  };
document.getElementById('dirBtn').onclick       = function(){
  gDir = gDir < 0.5 ? 1 : 0;
  document.getElementById('dirBtn').textContent = gDir < 0.5 ? 'X' : 'Y';
  /* switch d'axe = rebuild du patch audio avec inversion modulateur/porteur */
  if(synthOn && actx) rebuildPatch(images[imgIndex].synth || 'ravier');
};
document.getElementById('imgBtn').onclick = function(){ imgIndex=(imgIndex+1)%images.length; loadImage(imgIndex,false); };

/* ── Audio ── */

/* S&H simulé : ConstantSourceNode mis à jour périodiquement avec lissage */
function makeSH(rate, outputGain){
  if(!actx || !actx.createConstantSource) return null;
  var src  = actx.createConstantSource();
  var gain = actx.createGain(); gain.gain.value = outputGain;
  src.connect(gain); src.start();
  var current = 0, target = 0;
  var iv = setInterval(function(){
    if(!actx) return;
    target  = Math.random() * 2 - 1;
    current += (target - current) * 0.4;
    try { src.offset.setTargetAtTime(current, actx.currentTime, 0.07); } catch(e){}
  }, Math.round(1000 / Math.max(0.1, rate)));
  return {
    node: gain, src: src,
    setRate: function(r){ clearInterval(iv); /* simplifié : on ne redémarre pas l'interval ici */ },
    stop: function(){ clearInterval(iv); try{ src.stop(); }catch(e){} }
  };
}

function mkNoiseBuf(c){
  var len=c.sampleRate*2, nb=c.createBuffer(1,len,c.sampleRate), d=nb.getChannelData(0);
  for(var i=0;i<len;i++) d[i]=Math.random()*2-1;
  return nb;
}

function disposeNodes(){
  patchNodes.forEach(function(n){
    try{ if(n.stop) n.stop(0); n.disconnect(); }catch(e){}
  });
  patchNodes=[]; updateFn=null;
}

function rebuildPatch(name){
  if(!actx || !synthOn) return;
  disposeNodes();
  var dst = masterGain, now = actx.currentTime;
  var inv = (gDir < 0.5); /* axe X = mode inversé pour tous les patches */

  /* ── RAVIER : FM 2-op adouci ── */
  if(name === 'ravier'){
    var carrier = actx.createOscillator(); carrier.type = 'triangle';
    var modOsc  = actx.createOscillator(); modOsc.type  = inv ? 'sine' : 'square';
    var modGain = actx.createGain();
    var carGain = actx.createGain(); carGain.gain.value = 0.40;
    var lfo  = actx.createOscillator(); lfo.type = 'sine'; lfo.frequency.value = 3.2;
    var lfoG = actx.createGain(); lfoG.gain.value = 0;
    var filt = actx.createBiquadFilter(); filt.type = 'bandpass'; filt.Q.value = inv ? 1.5 : 2.8;
    /* saturation douce tanh — uniquement mode normal */
    var wave = actx.createWaveShaper();
    var wc = new Float32Array(512);
    for(var i=0;i<512;i++){ var x=i/256-1; wc[i]=Math.tanh(x*(inv?1.0:1.6))*0.80; }
    wave.curve = wc;
    /* S&H chaos sur fréquence carrier */
    var sh = makeSH(2 + gChaos * 8, 0);

    if(inv){
      /* inversion : carrier module modOsc */
      carrier.connect(modGain); modGain.connect(modOsc.frequency);
      modOsc.connect(carGain);
    } else {
      modOsc.connect(modGain); modGain.connect(carrier.frequency);
      carrier.connect(carGain);
    }
    if(sh) sh.node.connect(inv ? modOsc.frequency : carrier.frequency);
    lfo.connect(lfoG); lfoG.connect(inv ? modOsc.frequency : carrier.frequency);
    carGain.connect(filt); filt.connect(wave); wave.connect(dst);
    carrier.start(now); modOsc.start(now); lfo.start(now);
    patchNodes = [carrier, modOsc, lfo, modGain, carGain, lfoG, filt, wave];
    if(sh) patchNodes.push(sh);

    updateFn = function(){
      var t = actx.currentTime;
      /* diviseur 18 = tessiture moins criarde */
      var fc = 55 * Math.pow(2, gRep / 18);
      (inv ? modOsc : carrier).frequency.setTargetAtTime(fc, t, .10);
      (inv ? carrier : modOsc).frequency.setTargetAtTime(fc * (0.5 + gSpd * 0.22), t, .10);
      modGain.gain.setTargetAtTime(fc * Math.min(0.35 + gSpd * 0.13, 2.8), t, .08);
      lfo.frequency.setTargetAtTime(0.3 + gSpd * 0.22, t, .10);
      lfoG.gain.setTargetAtTime(gAmp * 160, t, .06);
      filt.frequency.setTargetAtTime(180 + gScaleY * 1700, t, .10);
      filt.Q.setTargetAtTime(inv ? 1.2 : (1.4 + gChaos * 7), t, .08);
      if(sh) try{ sh.node.gain.setTargetAtTime(fc * gChaos * 0.85, t, .05); }catch(e){}
    };
    document.getElementById('synthInfo').textContent =
      inv ? 'patch : fm inversé · creux · spectral' : 'patch : fm 2-op · cuivré · harangue';

  /* ── STEINIGER : soustractif ── */
  } else if(name === 'steiniger'){
    var o1 = actx.createOscillator(); o1.type = inv ? 'triangle' : 'square';
    var o2 = actx.createOscillator(); o2.type = inv ? 'sawtooth' : 'square';
    var g1 = actx.createGain(); g1.gain.value = 0.25;
    var g2 = actx.createGain(); g2.gain.value = 0.25;
    var filt = actx.createBiquadFilter();
    filt.type = inv ? 'highpass' : 'lowpass'; filt.Q.value = inv ? 0.5 : 0.7;
    var lfo  = actx.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.28;
    var lfoG = actx.createGain(); lfoG.gain.value=0;
    var sh = makeSH(1.5 + gChaos * 5, 0);

    o1.connect(g1); o2.connect(g2); g1.connect(filt); g2.connect(filt);
    lfo.connect(lfoG); lfoG.connect(filt.frequency);
    if(sh) sh.node.connect(filt.frequency);
    filt.connect(dst);
    o1.start(now); o2.start(now); lfo.start(now);
    patchNodes = [o1, o2, lfo, g1, g2, lfoG, filt];
    if(sh) patchNodes.push(sh);

    updateFn = function(){
      var t=actx.currentTime, fc=55*Math.pow(2,gRep/12), dt=(gScaleX-1)*80;
      o1.frequency.setTargetAtTime(fc, t, .10);
      o2.frequency.setTargetAtTime(fc*(1+(0.5+gSpd*0.35)*0.033), t, .10);
      o1.detune.setTargetAtTime(dt, t, .10); o2.detune.setTargetAtTime(-dt, t, .10);
      filt.frequency.setTargetAtTime(inv?(800+gScaleY*3000):(200+gScaleY*1600), t, .10);
      lfo.frequency.setTargetAtTime(0.05+gSpd*0.10, t, .10);
      lfoG.gain.setTargetAtTime(gAmp*480, t, .07);
      filt.Q.setTargetAtTime(inv?(0.3+gChaos*6):(0.4+gChaos*7), t, .10);
      if(sh) try{ sh.node.gain.setTargetAtTime((inv?1100:750)*gChaos, t, .05); }catch(e){}
    };
    document.getElementById('synthInfo').textContent =
      inv ? 'patch : soustractif · nasillard · contestataire' : 'patch : soustractif · rigide · parlementaire';

  /* ── VAL : additif ── */
  } else if(name === 'val'){
    var ratios = inv ? [1,3,5,7] : [1,2,4,8];
    var oscs  = ratios.map(function(){ var o=actx.createOscillator(); o.type='sine'; return o; });
    var gains = ratios.map(function(_,i){ var g=actx.createGain(); g.gain.value=0.19/(i+1); return g; });
    var shelf = actx.createBiquadFilter();
    shelf.type = inv ? 'lowshelf' : 'highshelf';
    shelf.frequency.value = inv ? 800 : 2000; shelf.gain.value = inv ? 4 : 6;
    var lfo  = actx.createOscillator(); lfo.type='sine';
    var lfoG = actx.createGain(); lfoG.gain.value=0;
    var sh = makeSH(1+gChaos*5, 0);

    oscs.forEach(function(o,i){ o.connect(gains[i]); gains[i].connect(shelf); });
    lfo.connect(lfoG); lfoG.connect(shelf.frequency);
    if(sh) sh.node.connect(shelf.frequency);
    shelf.connect(dst);
    oscs.forEach(function(o){ o.start(now); }); lfo.start(now);
    patchNodes = oscs.concat(gains,[lfo,lfoG,shelf]);
    if(sh) patchNodes.push(sh);

    updateFn = function(){
      var t=actx.currentTime, fc=55*Math.pow(2,gRep/12), fmR=0.5+gSpd*0.32;
      oscs.forEach(function(o,i){ o.frequency.setTargetAtTime(fc*ratios[i]*(1+(i>0?fmR*.07*i:0)),t,.10); });
      lfo.frequency.setTargetAtTime(0.2+gSpd*0.28, t, .10);
      lfoG.gain.setTargetAtTime(gAmp*850, t, .06);
      shelf.gain.setTargetAtTime((inv?2:3)+gChaos*18, t, .08);
      if(sh) try{ sh.node.gain.setTargetAtTime(fc*gChaos*1.4, t, .05); }catch(e){}
    };
    document.getElementById('synthInfo').textContent =
      inv ? 'patch : additif · harmoniques impaires · organique' : 'patch : additif · harmoniques paires · rhétorique';

  /* ── BLOCHER : sub pure, bruit atmosphérique minimal ── */
  } else if(name === 'blocher'){
    var sub  = actx.createOscillator(); sub.type  = 'sine';
    var sub2 = actx.createOscillator(); sub2.type = inv ? 'triangle' : 'sine';
    var subG  = actx.createGain(); subG.gain.value  = 0.50;
    var sub2G = actx.createGain(); sub2G.gain.value = 0.10;
    /* bruit très atténué — présence atmosphérique uniquement */
    var nSrc  = actx.createBufferSource(); nSrc.buffer=mkNoiseBuf(actx); nSrc.loop=true;
    var nFilt = actx.createBiquadFilter(); nFilt.type='bandpass'; nFilt.frequency.value=70; nFilt.Q.value=0.25;
    var nGain = actx.createGain(); nGain.gain.value = 0.018;
    var comb  = actx.createBiquadFilter();
    comb.type = inv ? 'highpass' : 'lowpass';
    comb.frequency.value = inv ? 110 : 270; comb.Q.value = inv ? 0.55 : 2.2;
    var lfo  = actx.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.04;
    var lfoG = actx.createGain(); lfoG.gain.value=0;
    var sh = makeSH(0.4+gChaos*2.5, 0);

    sub.connect(subG); subG.connect(comb);
    sub2.connect(sub2G); sub2G.connect(comb);
    nSrc.connect(nFilt); nFilt.connect(nGain); nGain.connect(comb);
    lfo.connect(lfoG); lfoG.connect(comb.frequency);
    if(sh) sh.node.connect(sub.frequency);
    comb.connect(dst);
    sub.start(now); sub2.start(now); nSrc.start(now); lfo.start(now);
    patchNodes = [sub,sub2,nSrc,lfo,subG,sub2G,nFilt,nGain,comb,lfoG];
    if(sh) patchNodes.push(sh);

    updateFn = function(){
      var t=actx.currentTime, fc=28*Math.pow(2,gRep/18);
      sub.frequency.setTargetAtTime(fc, t, .35);
      sub2.frequency.setTargetAtTime(fc*(inv?2.4:1.5), t, .30);
      nFilt.frequency.setTargetAtTime(fc*1.7, t, .30);
      comb.frequency.setTargetAtTime(inv?(180+gScaleY*550):(50+gScaleY*360), t, .25);
      comb.Q.setTargetAtTime(inv?(0.45+gChaos*4.5):(1.1+gChaos*9), t, .12);
      lfo.frequency.setTargetAtTime(0.01+gSpd*0.033, t, .25);
      lfoG.gain.setTargetAtTime(gAmp*260, t, .10);
      if(sh) try{ sh.node.gain.setTargetAtTime(fc*gChaos*0.65, t, .05); }catch(e){}
    };
    document.getElementById('synthInfo').textContent =
      inv ? 'patch : sub · grondement · montagnard' : 'patch : sub pure · tellurique · massif';

  /* ── LELLOUCHE : FM 3-op feedback ── */
  } else if(name === 'lellouche'){
    var op1 = actx.createOscillator(); op1.type='sawtooth';
    var op2 = actx.createOscillator(); op2.type='triangle';
    var op3 = actx.createOscillator(); op3.type='sine';
    var car = actx.createOscillator(); car.type='sine';
    var g1=actx.createGain(); g1.gain.value=0;
    var g2=actx.createGain(); g2.gain.value=0;
    var g3=actx.createGain(); g3.gain.value=0;
    var gCar=actx.createGain(); gCar.gain.value=0.44;
    var fbG=actx.createGain(); fbG.gain.value=0;
    var lfo=actx.createOscillator(); lfo.type='sine'; lfo.frequency.value=0.6;
    var lfoM=actx.createGain(); lfoM.gain.value=0;
    var filt=actx.createBiquadFilter(); filt.type='lowpass'; filt.Q.value=3.5;
    var sh=makeSH(1.5+gChaos*6, 0);

    op1.connect(g1); g1.connect(op2.frequency);
    op2.connect(g2); g2.connect(op3.frequency);
    op3.connect(g3); g3.connect(car.frequency);
    car.connect(gCar);

    if(inv){
      /* inversion : car boucle sur op1 (feedback externe plus instable) */
      car.connect(fbG); fbG.connect(op1.frequency);
    } else {
      op1.connect(fbG); fbG.connect(op1.frequency);
    }

    lfo.connect(lfoM); lfoM.connect(g1.gain); lfoM.connect(g2.gain); lfoM.connect(g3.gain);
    if(sh){ sh.node.connect(g1.gain); sh.node.connect(g2.gain); }
    gCar.connect(filt); filt.connect(dst);
    [op1,op2,op3,car,lfo].forEach(function(o){ o.start(now); });
    patchNodes=[op1,op2,op3,car,lfo,g1,g2,g3,gCar,fbG,lfoM,filt];
    if(sh) patchNodes.push(sh);

    updateFn=function(){
      var t=actx.currentTime, fc=55*Math.pow(2,gRep/12), fmR=0.5+gSpd*0.32;
      car.frequency.setTargetAtTime(fc,t,.08);
      op3.frequency.setTargetAtTime(fc*fmR,t,.08);
      op2.frequency.setTargetAtTime(fc*fmR*1.4,t,.08);
      op1.frequency.setTargetAtTime(fc*fmR*1.9,t,.08);
      var idx=fc*(0.28+gChaos*3.5);
      g1.gain.setTargetAtTime(idx,t,.08); g2.gain.setTargetAtTime(idx*.58,t,.08); g3.gain.setTargetAtTime(idx*.28,t,.08);
      lfo.frequency.setTargetAtTime(0.2+gSpd*0.17,t,.10);
      lfoM.gain.setTargetAtTime(gAmp*idx*1.4,t,.05);
      fbG.gain.setTargetAtTime(inv?(0.04+gChaos*0.55):(gChaos*0.38),t,.10);
      filt.frequency.setTargetAtTime(280+gScaleY*2700,t,.10);
      filt.Q.setTargetAtTime(1.4+gChaos*8,t,.10);
      if(sh) try{ sh.node.gain.setTargetAtTime(fc*gChaos*0.75,t,.05); }catch(e){}
    };
    document.getElementById('synthInfo').textContent =
      inv ? 'patch : fm boucle · instable · charnel' : 'patch : fm 3-op feedback · cinématique · ascendant';
  }
}

function initAudio(){
  if(actx) return;
  actx = new(window.AudioContext||window.webkitAudioContext)();
  masterGain = actx.createGain(); masterGain.gain.value=0.48;
  masterGain.connect(actx.destination);
}

document.getElementById('soundBtn').onclick=function(){
  initAudio();
  if(actx.state==='suspended') actx.resume();
  synthOn=!synthOn;
  document.getElementById('soundBtn').classList.toggle('on',synthOn);
  if(synthOn){ rebuildPatch(images[imgIndex].synth||'ravier'); }
  else{ disposeNodes(); document.getElementById('synthInfo').textContent=''; }
};

/* ── Boucle principale ── */
var startT=performance.now();
function loop(){
  var t=(performance.now()-startT)/1000;
  gl.uniform1f(U.time,  t);
  gl.uniform1f(U.rep,   Math.max(0.1,gRep));
  gl.uniform1f(U.spd,   gSpd);
  gl.uniform1f(U.amp,   Math.max(0,gAmp));
  gl.uniform1f(U.dir,   gDir);
  gl.uniform1f(U.chaos, gChaos);
  gl.uniform1f(U.scaleX,Math.max(0.01,gScaleX));
  gl.uniform1f(U.scaleY,Math.max(0.01,gScaleY));
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  if(synthOn&&actx&&updateFn) updateFn();
  requestAnimationFrame(loop);
}

loadImage(imgIndex,true);
loop();
</script>
