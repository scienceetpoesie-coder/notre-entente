<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Roulette</title>
  <link rel="icon" href="https://github.com/scienceetpoesie-coder/notre-entente/raw/refs/heads/main/assets/walmart.ico" type="image/x-icon">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #fff; }
    #roulette-wrap {
      background: #fff;
      width: 100vw;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
    }
    #slot {
      width: 90vw;
      max-width: 900px;
      height: 70vh;
      position: relative;
      overflow: hidden;
    }
    #slot img {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 100%;
      object-fit: contain;
      opacity: 0;
    }
    #slot img.visible { opacity: 1; }
    #btn {
      padding: 14px 48px;
      font-size: 18px;
      font-family: 'Times New Roman', serif;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      background: transparent;
      color: black;
      border: 2px solid black;
      cursor: pointer;
    }
    #btn:hover { background: black; color: white; }
  </style>
</head>
<body>
  <div id="roulette-wrap">
    <div id="slot">
      <img class="visible" src="https://github.com/scienceetpoesie-coder/notre-entente/blob/main/assets/batiment%20d%C3%A9truit/batiment%20d%C3%A9truit%20NE%20(1).png?raw=true">
      <img src="https://github.com/scienceetpoesie-coder/notre-entente/blob/main/assets/batiment%20d%C3%A9truit/batiment%20d%C3%A9truit%20NE%20(2).png?raw=true">
      <img src="https://github.com/scienceetpoesie-coder/notre-entente/blob/main/assets/batiment%20d%C3%A9truit/batiment%20d%C3%A9truit%20NE%20(3).png?raw=true">
      <img src="https://github.com/scienceetpoesie-coder/notre-entente/blob/main/assets/batiment%20d%C3%A9truit/batiment%20d%C3%A9truit%20NE%20(4).png?raw=true">
      <img src="https://github.com/scienceetpoesie-coder/notre-entente/blob/main/assets/batiment%20d%C3%A9truit/batiment%20d%C3%A9truit%20NE%20(5).png?raw=true">
      <img src="https://github.com/scienceetpoesie-coder/notre-entente/blob/main/assets/batiment%20d%C3%A9truit/batiment%20d%C3%A9truit%20NE%20(6).png?raw=true">
      <img src="https://github.com/scienceetpoesie-coder/notre-entente/blob/main/assets/batiment%20d%C3%A9truit/batiment%20d%C3%A9truit%20NE%20(7).png?raw=true">
      <img src="https://github.com/scienceetpoesie-coder/notre-entente/blob/main/assets/batiment%20d%C3%A9truit/batiment%20d%C3%A9truit%20NE%20(8).png?raw=true">
      <img src="https://github.com/scienceetpoesie-coder/notre-entente/blob/main/assets/batiment%20d%C3%A9truit/batiment%20d%C3%A9truit%20NE%20(9).png?raw=true">
      <img src="https://github.com/scienceetpoesie-coder/notre-entente/blob/main/assets/batiment%20d%C3%A9truit/batiment%20d%C3%A9truit%20NE%20(10).png?raw=true">
      <img src="https://github.com/scienceetpoesie-coder/notre-entente/blob/main/assets/batiment%20d%C3%A9truit/batiment%20d%C3%A9truit%20NE%20(11).png?raw=true">

      <img src="https://github.com/scienceetpoesie-coder/notre-entente/blob/main/assets/batiment%20d%C3%A9truit/batiment%20d%C3%A9truit%20NE%20(19).png?raw=true">
      <img src="https://github.com/scienceetpoesie-coder/notre-entente/blob/main/assets/batiment%20d%C3%A9truit/batiment%20d%C3%A9truit%20NE%20(20).png?raw=true">

      <img src="https://github.com/scienceetpoesie-coder/notre-entente/blob/main/assets/batiment%20d%C3%A9truit/batiment%20d%C3%A9truit%20NE%20(23).png?raw=true">
      <img src="https://github.com/scienceetpoesie-coder/notre-entente/blob/main/assets/batiment%20d%C3%A9truit/batiment%20d%C3%A9truit%20NE%20(24).png?raw=true">
    </div>
    <button id="btn">STOP</button>
  </div>
  <script>
    const imgs = document.querySelectorAll('#slot img');
    const btn = document.getElementById('btn');
    let current = 0;
    let spinning = true;
    let timer = null;

    function show(i) {
      imgs[current].classList.remove('visible');
      current = i % imgs.length;
      imgs[current].classList.add('visible');
    }

    function tick() {
      show(Math.floor(Math.random() * imgs.length));
      timer = setTimeout(tick, 80);
    }

    function stop() {
      spinning = false;
      clearTimeout(timer);
      btn.textContent = 'RELANCER';
      btn.onclick = relaunch;
    }

    function relaunch() {
      spinning = true;
      btn.textContent = 'STOP';
      btn.onclick = stop;
      tick();
    }

    btn.onclick = stop;
    tick();
  </script>
</body>
</html>
